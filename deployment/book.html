<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | Clean SD</title>
    <style>
        /* --- COPYING YOUR THEME --- */
        :root {
            --primary: #001F3F;
            --accent: #FF6B00;
            --bg-body: #ffffff;
            --text-main: #333333;
            --border: #eeeeee;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #121212;
                --text-main: #e0e0e0;
                --border: #333333;
            }
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; padding: 0;
            background: var(--bg-body); color: var(--text-main);
        }

        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }

        /* HEADER */
        .simple-header { text-align: center; margin-bottom: 40px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        @media (prefers-color-scheme: dark) { .logo { color: white; } }

        /* FORM STYLE */
        form { display: flex; flex-direction: column; gap: 20px; }
        
        label { font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; }
        
        input, select, textarea {
            width: 100%; padding: 15px;
            border: 1px solid #ccc; border-radius: 8px;
            font-size: 16px; background: white; color: #333;
            box-sizing: border-box; /* Fixes padding issues */
        }

        button {
            background-color: var(--accent); color: white;
            border: none; padding: 15px; font-size: 18px; font-weight: bold;
            border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        button:hover { background-color: #e55a00; }

        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-main); text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="simple-header">
            <a href="/" class="logo">Clean <span>SD</span></a>
            <h2>Get Your Free Quote</h2>
            <p>Tell us about your home. We'll reply within 15 minutes.</p>
        </div>

        <form action="https://formsubmit.co/san.diego.cleaner2022@gmail.com" method="POST">
            
            <input type="text" name="_honey" style="display:none">
            <input type="hidden" name="_next" value="https://clean-sd.org">
            <input type="hidden" name="_subject" value="New Lead from Clean SD Website!">

            <div>
                <label>Full Name</label>
                <input type="text" name="Name" required placeholder="John Doe">
            </div>

            <div>
                <label>Phone Number</label>
                <input type="tel" name="Phone" required placeholder="(555) 123-4567">
            </div>

            <div>
                <label>Service Address</label>
                <input type="text" name="Address" required placeholder="San Diego, CA">
            </div>

            <div>
                <label>Service Type</label>
                <select name="Service">
                    <option>Airbnb / Turnover Cleaning</option>
                    <option>Move-In / Move-Out Deep Clean</option>
                    <option>Standard Residential Clean</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <div style="flex:1">
                    <label>Bedrooms</label>
                    <select name="Bedrooms">
                        <option>Studio</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4+</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label>Bathrooms</label>
                    <select name="Bathrooms">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4+</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Preferred Date</label>
                <input type="date" name="Date">
            </div>

            <button type="submit">Request Booking</button>
        </form>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
