<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=DM+Sans:wght@300;400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="#0a1628"/>

  <!-- Top decorative line -->
  <line x1="40" y1="52" x2="360" y2="52" stroke="#c9a84c" stroke-width="0.75" opacity="0.6"/>

  <!-- Main wordmark: CLEAN -->
  <text
    x="200"
    y="105"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="52"
    font-weight="700"
    fill="#c9a84c"
    text-anchor="middle"
    letter-spacing="18"
  >CLEAN</text>

  <!-- SD accent -->
  <text
    x="200"
    y="140"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="400"
    fill="#f8f6f0"
    text-anchor="middle"
    letter-spacing="22"
  >SD</text>

  <!-- Bottom decorative line -->
  <line x1="40" y1="158" x2="360" y2="158" stroke="#c9a84c" stroke-width="0.75" opacity="0.6"/>

  <!-- Tagline -->
  <text
    x="200"
    y="178"
    font-family="Arial, sans-serif"
    font-size="9"
    font-weight="400"
    fill="#8892a4"
    text-anchor="middle"
    letter-spacing="4"
  >AIRBNB SPECIALISTS · SAN DIEGO</text>

</svg>
